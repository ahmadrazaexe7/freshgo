version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: freshgo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fresh_home_mart
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
    name: freshgo_postgres_data
